const TEAL   = "#0ea5e9";

/** Secondary accent for “open app” entry points (teal family, distinct from primary indigo) */

const APP_LINK_BRIGHT = "#2dd4bf";
const APP_HREF        = "https://app.hflow.pro";

/** Base URL of the Next.js app for the demo form (no trailing slash). Meta `hflow-api-origin` overrides; localhost pages default to http://localhost:3000. */
function getDemoRequestApiBase() {
  const meta = document.querySelector('meta[name="hflow-api-origin"]');
  const fromMeta = meta?.getAttribute("content")?.trim().replace(/\/$/, "") ?? "";
  if (fromMeta) return fromMeta;
  const h = window.location.hostname;
  if (h === "localhost" || h === "127.0.0.1") return "http://localhost:3000";
  return "https://app.hflow.pro";
}

/** Resolve `Assets/…` against the current page (works for file:// and any deploy path). */
function assetUrl(relativePath) {
  try {
    return new URL(relativePath, window.location.href).href;
  } catch {
    return relativePath;
  }
}

  return (
    <div

}

// Brand wordmark (text, matches in-app header style)

    <span

}

// Demo CTA
function DemoCTA({ dark, accent }) {
  const [name, setName]   = React.useState("");
  const [email, setEmail] = React.useState("");
  const [school, setSchool] = React.useState("");
  const [phone, setPhone] = React.useState("");
  const [sent, setSent]   = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [error, setError] = React.useState(null);

  const bg = dark
    ? "linear-gradient(135deg, #0c1440 0%, #1e3270 100%)"
    : `linear-gradient(135deg, ${accent} 0%, #0ea5e9 100%)`;

  const inp = {
    width: "100%", padding: "12px 16px", borderRadius: 10,
    border: "1px solid rgba(255,255,255,0.38)",
    background: "rgba(255,255,255,0.2)",
    fontSize: 15, fontWeight: 500, outline: "none",
  };

  async function submitDemo() {
    if (!name.trim() || !email.trim() || !school.trim()) return;
    setError(null);
    setSubmitting(true);
    const apiBase = getDemoRequestApiBase();
    const pageHttps = window.location.protocol === "https:";
    const apiLocalHttp =
      /^http:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(apiBase);
    const errGeneric =
      "We couldn't send your request. Please try again in a few minutes. If it keeps happening, email support@hflow.pro.";
    if (pageHttps && apiBase.startsWith("http:") && !apiLocalHttp) {
      setError(errGeneric);
      setSubmitting(false);
      return;
    }
    if (pageHttps && apiLocalHttp) {
      setError(errGeneric);
      setSubmitting(false);
      return;
    }
    try {
      const res = await fetch(`${apiBase}/api/demo-request`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: name.trim(),
          email: email.trim(),
          school: school.trim(),
          ...(phone.trim() ? { phone: phone.trim() } : {}),
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 201) {
        setSent(true);
        return;
      }
      if (res.status === 429) {
        setError("Too many requests. Please try again later.");
        return;
      }
      if (res.status === 400 && typeof data.error === "string") {
        setError(data.error);
        return;
      }
      setError(errGeneric);
    } catch (err) {
      console.error("[demo-request] fetch failed (check API URL, HTTPS, and CORS allowlist):", apiBase, err);
      setError(errGeneric);
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <section id="demo" style={{ background: bg, padding: "100px 40px", position: "relative", overflow: "hidden" }}>
      <div style={{
        position: "absolute", top: -100, right: -100,
        width: 500, height: 500,
        background: "rgba(255,255,255,0.05)", borderRadius: "50%", pointerEvents: "none",
      }} />
      <div style={{ maxWidth: 560, margin: "0 auto", position: "relative", textAlign: "center" }}>
        <h2 style={{ fontSize: "clamp(28px, 4vw, 42px)", fontWeight: 800, color: "white", letterSpacing: "-0.02em", marginBottom: 16 }}>
          See hFlow in action
        </h2>
        <p style={{ fontSize: 16, color: "rgba(255,255,255,0.75)", marginBottom: 40, lineHeight: 1.65 }}>
          Request a personalized demo and we'll walk you through the platform and answer your questions.
        </p>

        {sent ? (
          <div style={{
            background: "rgba(255,255,255,0.15)", borderRadius: 16, padding: "32px",
            color: "white", fontSize: 16, fontWeight: 600,
          }}>
            ✓ Thanks! We'll be in touch shortly.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {error && (
              <div role="alert" style={{
                background: "rgba(220, 38, 38, 0.25)", border: "1px solid rgba(252, 165, 165, 0.6)",
                borderRadius: 10, padding: "12px 16px", color: "#fff", fontSize: 14, textAlign: "left",
              }}>{error}</div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <input className="demo-input" value={name} onChange={e => setName(e.target.value)}
                placeholder="Your name" style={inp} disabled={submitting} />
              <input className="demo-input" value={email} onChange={e => setEmail(e.target.value)}
                placeholder="Work email" type="email" style={inp} disabled={submitting} />
            </div>
            <input className="demo-input" value={school} onChange={e => setSchool(e.target.value)}
              placeholder="School or organization name" style={{ ...inp, width: "100%" }} disabled={submitting} />
            <input className="demo-input" value={phone} onChange={e => setPhone(e.target.value)}
              placeholder="Phone (optional)" type="tel" inputMode="tel" autoComplete="tel"
              style={{ ...inp, width: "100%" }} disabled={submitting} />
            <button
              type="button"
              onClick={submitDemo}
              disabled={submitting || !name.trim() || !email.trim() || !school.trim()}
              style={{
                background: "white", color: accent,
                padding: "14px 32px", borderRadius: 999,
                fontSize: 15, fontWeight: 700,
                cursor: submitting || !name.trim() || !email.trim() || !school.trim() ? "not-allowed" : "pointer",
                border: "none", marginTop: 4, opacity: submitting || !name.trim() || !email.trim() || !school.trim() ? 0.65 : 1,
                boxShadow: "0 8px 24px rgba(0,0,0,0.2)",
                transition: "transform 0.15s",
              }}>{submitting ? "Sending…" : "Request a Demo"}</button>
          </div>
        )}
      </div>
    </section>
  );
}
