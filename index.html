<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "light",
  "accentColor": "#4f46e5",
  "heroStyle": "gradient"
}/*EDITMODE-END*/;

// ── Palette ──────────────────────────────────────────────────────────────────
const NAVY   = "#1e3270";
const TEAL   = "#0ea5e9";
const INDIGO = "#4f46e5";
const SLATE  = "#475569";
/** Secondary accent for “open app” entry points — teal family, distinct from primary indigo */
const APP_LINK        = "#0d9488";
const APP_LINK_BRIGHT = "#2dd4bf";
const APP_HREF        = "https://app.hflow.pro";

/** Base URL of the Next.js app for the demo form (no trailing slash). Meta `hflow-api-origin` overrides; localhost pages default to http://localhost:3000. */
function getDemoRequestApiBase() {
  const meta = document.querySelector('meta[name="hflow-api-origin"]');
  const fromMeta = meta?.getAttribute("content")?.trim().replace(/\/$/, "") ?? "";
  if (fromMeta) return fromMeta;
  const h = window.location.hostname;
  if (h === "localhost" || h === "127.0.0.1") return "http://localhost:3000";
  return "https://app.hflow.pro";
}

// ── Small helpers ─────────────────────────────────────────────────────────────
function Placeholder({ label, width = "100%", height = 320, className = "" }) {
  return (
    <div
      className={className}
      style={{
        width, height,
        background: "repeating-linear-gradient(45deg,#e2e8f0 0px,#e2e8f0 1px,#f8fafc 0px,#f8fafc 12px)",
        borderRadius: 16,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        border: "1px solid #e2e8f0",
        color: "#94a3b8",
        fontFamily: "monospace",
        fontSize: 13,
        textAlign: "center",
        padding: "0 24px",

}

// ── Brand wordmark (text, matches in-app header style) ────────────────────────

  { q: "How is student data protected?", a: "All data is encrypted in transit, and students' PII is also encrypted at rest. Access is scoped per school with role-based permissions (admin and teacher). Student records are soft-deleted and never permanently exposed." },

// ── Demo CTA ──────────────────────────────────────────────────────────────────
function DemoCTA({ dark, accent }) {
  const [name, setName]   = React.useState("");
  const [email, setEmail] = React.useState("");
  const [school, setSchool] = React.useState("");
  const [sent, setSent]   = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [error, setError] = React.useState(null);

  const bg = dark
    ? "linear-gradient(135deg, #0c1440 0%, #1e3270 100%)"
    : `linear-gradient(135deg, ${accent} 0%, #0ea5e9 100%)`;

  const inp = {
    width: "100%", padding: "12px 16px", borderRadius: 10,
    border: "1px solid rgba(255,255,255,0.38)",
    background: "rgba(255,255,255,0.2)",
    fontSize: 15, fontWeight: 500, outline: "none",
  };

  async function submitDemo() {
    if (!name.trim() || !email.trim() || !school.trim()) return;
    setError(null);
    setSubmitting(true);
    const apiBase = getDemoRequestApiBase();
    const pageHttps = window.location.protocol === "https:";
    const apiLocalHttp =
      /^http:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(apiBase);
    const errGeneric =
      "We couldn't send your request. Please try again in a few minutes. If it keeps happening, email support@hflow.pro.";
    if (pageHttps && apiBase.startsWith("http:") && !apiLocalHttp) {
      setError(errGeneric);
      setSubmitting(false);
      return;
    }
    if (pageHttps && apiLocalHttp) {
      setError(errGeneric);
      setSubmitting(false);
      return;
    }
    try {
      const res = await fetch(`${apiBase}/api/demo-request`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: name.trim(),
          email: email.trim(),
          school: school.trim(),
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 201) {
        setSent(true);
        return;
      }
      if (res.status === 429) {
        setError("Too many requests. Please try again later.");
        return;
      }
      if (res.status === 400 && typeof data.error === "string") {
        setError(data.error);
        return;
      }
      setError(errGeneric);
    } catch (err) {
      console.error("[demo-request] fetch failed (check API URL, HTTPS, and CORS allowlist):", apiBase, err);
      setError(errGeneric);
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <section id="demo" style={{ background: bg, padding: "100px 40px", position: "relative", overflow: "hidden" }}>
      <div style={{
        position: "absolute", top: -100, right: -100,
        width: 500, height: 500,
        background: "rgba(255,255,255,0.05)", borderRadius: "50%", pointerEvents: "none",
      }} />
      <div style={{ maxWidth: 560, margin: "0 auto", position: "relative", textAlign: "center" }}>
        <h2 style={{ fontSize: "clamp(28px, 4vw, 42px)", fontWeight: 800, color: "white", letterSpacing: "-0.02em", marginBottom: 16 }}>
          See hFlow in action
        </h2>
        <p style={{ fontSize: 16, color: "rgba(255,255,255,0.75)", marginBottom: 40, lineHeight: 1.65 }}>
          Request a personalized demo and we'll walk you through the platform with your school's use case in mind.
        </p>

        {sent ? (
          <div style={{
            background: "rgba(255,255,255,0.15)", borderRadius: 16, padding: "32px",
            color: "white", fontSize: 16, fontWeight: 600,
          }}>
            ✓ Thanks! We'll be in touch shortly.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {error && (
              <div role="alert" style={{
                background: "rgba(220, 38, 38, 0.25)", border: "1px solid rgba(252, 165, 165, 0.6)",
                borderRadius: 10, padding: "12px 16px", color: "#fff", fontSize: 14, textAlign: "left",
              }}>{error}</div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <input className="demo-input" value={name} onChange={e => setName(e.target.value)}
                placeholder="Your name" style={inp} disabled={submitting} />
              <input className="demo-input" value={email} onChange={e => setEmail(e.target.value)}
                placeholder="Work email" type="email" style={inp} disabled={submitting} />
            </div>
            <input className="demo-input" value={school} onChange={e => setSchool(e.target.value)}
              placeholder="School or organization name" style={{ ...inp, width: "100%" }} disabled={submitting} />
            <button
              type="button"
              onClick={submitDemo}
              disabled={submitting || !name.trim() || !email.trim() || !school.trim()}
              style={{
                background: "white", color: accent,
                padding: "14px 32px", borderRadius: 999,
                fontSize: 15, fontWeight: 700,
                cursor: submitting || !name.trim() || !email.trim() || !school.trim() ? "not-allowed" : "pointer",
                border: "none", marginTop: 4, opacity: submitting || !name.trim() || !email.trim() || !school.trim() ? 0.65 : 1,
                boxShadow: "0 8px 24px rgba(0,0,0,0.2)",
                transition: "transform 0.15s",
              }}>{submitting ? "Sending…" : "Request a Demo"}</button>
          </div>
        )}
      </div>
    </section>
  );
}

  return (

      <div style={{ maxWidth: 760, margin: "0 auto", textAlign: "center" }}>
        <h2 style={{ fontSize: "clamp(24px, 3vw, 36px)", fontWeight: 800, color: h, letterSpacing: "-0.02em", marginBottom: 20 }}>
          Built by educators, for educators
        </h2>
        <p style={{ fontSize: 15, color: body, lineHeight: 1.8, textWrap: "pretty" }}>
          hFlow was born from the frustration of juggling spreadsheets, disconnected tools, and assessment software that doesn't match the way schools actually run. We built the platform we wished existed — one that respects teachers' time, surfaces meaningful data, and keeps parents in the loop.
        </p>
      </div>
    </section>

}

        <Wordmark muted size={20} />
        <div style={{ fontSize: 13, display: "flex", gap: 28, alignItems: "center", flexWrap: "wrap" }}>
          <a href={APP_HREF} style={{ color: APP_LINK_BRIGHT, fontWeight: 600, textDecoration: "none" }}>
            Open app
          </a>
          {["Privacy","Terms","Contact"].map(t => (
            <a key={t} href="#" style={{ color: body, textDecoration: "none" }}>{t}</a>

        <div style={{ fontSize: 13 }}>© 2026 hFlow. All rights reserved.</div>
      </div>

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const dark   = t.direction === "dark";
  const accent = t.accentColor;

  return (
    <div style={{ background: dark ? "#0c1440" : "white" }}>
      <Nav dark={dark} accent={accent} />
      <Hero dark={dark} accent={accent} heroStyle={t.heroStyle} />
      <Features dark={dark} accent={accent} />
      <HowItWorks dark={dark} accent={accent} />
      <ReportingCallout dark={dark} accent={accent} />
      <FAQ dark={dark} accent={accent} />
      <DemoCTA dark={dark} accent={accent} />
      <About dark={dark} accent={accent} />
      <Footer dark={dark} accent={accent} />

      <TweaksPanel>
        <TweakSection label="Direction" />
        <TweakRadio label="Theme" value={t.direction} options={["light","dark"]}
          onChange={v => setTweak("direction", v)} />
        <TweakSection label="Hero Style" />
        <TweakRadio label="Background" value={t.heroStyle} options={["gradient","flat"]}
          onChange={v => setTweak("heroStyle", v)} />
        <TweakSection label="Accent Color" />
        <TweakColor label="Color" value={t.accentColor}
          onChange={v => setTweak("accentColor", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
